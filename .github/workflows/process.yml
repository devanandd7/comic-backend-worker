name: Comic Processor

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL of the comic collage image to process'
        required: true
      job_id:
        description: 'Unique ID for this processing job'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install opencv-python-headless numpy cloudinary
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl

    - name: Download uploaded image
      run: |
        curl -L "${{ github.event.inputs.image_url }}" -o input.jpg

    - name: Detect and crop panels
      run: |
        python scripts/detect_panels.py

    - name: Build comic video
      run: |
        python scripts/build_video.py

    - name: Upload to Cloudinary for Auto-Preview
      run: |
        python scripts/upload_results.py
      env:
        JOB_ID: ${{ github.event.inputs.job_id }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: comic-output
        path: output/
